<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Dollar sign accent -->
  <text x="52" y="18" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#34d399" opacity="0.3">$</text>
  <!-- CUBI text -->
  <text x="32" y="40" font-family="Arial Black,Arial,sans-serif" font-size="18" font-weight="900" fill="url(#txt)" text-anchor="middle" letter-spacing="0.5">CUBI</text>
  <!-- Underline accent -->
  <rect x="12" y="45" width="40" height="2.5" rx="1.25" fill="#10b981" opacity="0.6"/>
</svg>
